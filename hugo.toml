baseURL = 'https://example.com/'
languageCode = 'en-us'
title = 'Learning in Public'
paginate = 6
buildDrafts = false
buildFuture = false
enableRobotsTXT = true
summaryLength = 28

[taxonomies]
  category = 'categories'
  tag = 'tags'

[permalinks]
  posts = '/:sections/:slug/'

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = true
    lineNumbersInTable = false
    noClasses = false
    style = 'github-dark'
    tabWidth = 2

[params]
  author = 'Fabin'
  description = 'Personal blog focused on Learning in Public for Electrical Engineering and Programming.'
  showReadingTime = true
  enableKaTeX = true
  sections = ['calculus', 'circuits', 'programming', 'english']
  featuredPostCount = 5

[menu]
  [[menu.main]]
    name = 'Home'
    pageRef = '/'
    weight = 10
  [[menu.main]]
    name = 'Topics'
    pageRef = '/topics'
    weight = 20
  [[menu.main]]
    name = 'About'
    pageRef = '/about'
    weight = 30
