{{ define "main" }}
<article class="card post-content">
  <p class="post-meta">{{ .Section }} · {{ .Date.Format "02 Jan 2006" }}{{ if site.Params.showReadingTime }} · {{ .ReadingTime }} min de leitura{{ end }}</p>
  <h1>{{ .Title }}</h1>
  {{ with .Description }}<p class="lead">{{ . }}</p>{{ end }}

  {{ with .Params.tags }}
    <div class="tag-row">
      {{ range . }}<span class="tag">{{ . }}</span>{{ end }}
    </div>
  {{ end }}

  <div class="content-body">
    {{ .Content }}
  </div>
</article>
{{ end }}
